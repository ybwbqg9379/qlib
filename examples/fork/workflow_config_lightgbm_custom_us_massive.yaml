# [FORK] Phase 3: LightGBM on Alpha158 + OUR OWN custom factors (FORK.md §10 Phase 3).
# Identical to workflow_config_lightgbm_alpha158_us_massive.yaml EXCEPT the handler is
# our `Alpha158Custom` (qlib.custom.data.handler) = Alpha158 + 6 curated alphas.
# This is the reference "custom class via module_path, no upstream edits" workflow.
qlib_init:
    provider_uri: "~/.qlib/qlib_data/us_data_massive"
    region: us
market: &market all
benchmark: &benchmark SPY
data_handler_config: &data_handler_config
    start_time: 2008-01-01
    end_time: 2026-06-01
    fit_start_time: 2008-01-01
    fit_end_time: 2018-12-31
    instruments: *market
port_analysis_config: &port_analysis_config
    strategy:
        class: TopkDropoutStrategy
        module_path: qlib.contrib.strategy
        kwargs:
            signal: <PRED>
            topk: 50
            n_drop: 5
    backtest:
        start_time: 2021-01-01
        end_time: 2026-06-01
        account: 100000000
        benchmark: *benchmark
        exchange_kwargs:
            deal_price: close
            open_cost: 0.0005
            close_cost: 0.0015
            min_cost: 1
task:
    model:
        class: LGBModel
        module_path: qlib.contrib.model.gbdt
        kwargs:
            loss: mse
            colsample_bytree: 0.8879
            learning_rate: 0.2
            subsample: 0.8789
            lambda_l1: 205.6999
            lambda_l2: 580.9768
            max_depth: 8
            num_leaves: 210
            num_threads: 20
    dataset:
        class: DatasetH
        module_path: qlib.data.dataset
        kwargs:
            handler:
                class: Alpha158Custom
                module_path: qlib.custom.data.handler
                kwargs: *data_handler_config
            segments:
                train: [2008-01-01, 2018-12-31]
                valid: [2019-01-01, 2020-12-31]
                test: [2021-01-01, 2026-06-01]
    record:
        - class: SignalRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            model: <MODEL>
            dataset: <DATASET>
        - class: SigAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            ana_long_short: False
            ann_scaler: 252
        - class: PortAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
            config: *port_analysis_config
